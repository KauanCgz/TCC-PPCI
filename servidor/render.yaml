services:
  - type: web
    name: ppci-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SERVER_TOKEN
        generateValue: true   # Render gera automaticamente um token seguro
    disk:
      name: pdfs-storage
      mountPath: /opt/render/project/src/pdfs
      sizeGB: 1
